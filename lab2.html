<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Complete Registration Form</title>
</head>
<body>

    <h1>Complete Registration Form</h1>

    <form action="/register" method="POST" enctype="multipart/form-data">

        <fieldset>
            <legend>Personal Information</legend>

            <label for="fullname">Full Name:</label><br>
            <input type="text" id="fullname" name="fullname"
                   placeholder="Enter your full name"
                   required minlength="3" maxlength="50"><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email"
                   placeholder="example@email.com" required><br><br>

            <label for="password">Password:</label><br>
            <input type="password" id="password" name="password"
                   placeholder="Minimum 8 characters"
                   required minlength="8"><br><br>

            <label for="dob">Date of Birth:</label><br>
            <input type="date" id="dob" name="dob" required><br><br>

            <label for="phone">Phone Number:</label><br>
            <input type="tel" id="phone" name="phone"
                   placeholder="059-123-4567"
                   pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
                   title="Format: 059-123-4567"><br><br>

        </fieldset>

        <fieldset>
            <legend>Account Information</legend>

            <label for="username">Username:</label><br>
            <input type="text" id="username" name="username"
                   placeholder="Choose a username"
                   required pattern="[A-Za-z0-9]{3,20}"
                   title="3-20 characters, letters and numbers only"><br><br>

            <label for="major">Major:</label><br>
            <select id="major" name="major" required>
                <option value="">-- Select Major --</option>
                <option value="smart-systems">Smart Systems and Computer Engineering</option>
                <option value="computer-science">Computer Science</option>
                <option value="information-technology">Information Technology</option>
                <option value="multimedia">Multimedia</option>
            </select><br><br>

            <p>Gender:</p>
            <input type="radio" id="male" name="gender" value="male" required>
            <label for="male">Male</label><br>

            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label><br><br>

        </fieldset>

        <fieldset>
            <legend>Preferences</legend>

            <p>Interests:</p>

            <input type="checkbox" id="html" name="interests" value="html">
            <label for="html">HTML</label><br>

            <input type="checkbox" id="css" name="interests" value="css">
            <label for="css">CSS</label><br>

            <input type="checkbox" id="programming" name="interests" value="programming">
            <label for="programming">Programming</label><br>

            <input type="checkbox" id="design" name="interests" value="design">
            <label for="design">Design</label><br><br>

            <label for="skill">Programming Skill Level:</label><br>
            <input type="range" id="skill" name="skill" min="1" max="10" value="5"><br><br>

            <label for="photo">Upload Profile Photo:</label><br>
            <input type="file" id="photo" name="photo" accept="image/*"><br><br>

            <label for="browser">Favorite Browser:</label><br>
            <input type="text" id="browser" name="browser" list="browsers"
                   placeholder="Choose or type browser">

            <datalist id="browsers">
                <option value="Chrome">
                <option value="Firefox">
                <option value="Edge">
                <option value="Safari">
                <option value="Opera">
            </datalist><br><br>

        </fieldset>

        <fieldset>
            <legend>Additional Information</legend>

            <label for="bio">Tell us about yourself:</label><br>
            <textarea id="bio" name="bio" rows="5" cols="50"
                      placeholder="Write a short bio..."
                      maxlength="300"></textarea><br><br>

            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms">I agree to the Terms and Conditions</label><br><br>

        </fieldset>

        <br>

        <button type="submit">Register</button>
        <button type="reset">Clear Form</button>

    </form>

</body>
</html>
